<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Dashboard - Stocker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#0f172a; color:white; }
        .card { background:#1e293b; border:none; }
        .btn-custom { background:#2563eb; color:white; }
        .btn-danger { background:#dc2626; }
    </style>
</head>

<body>

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h3 id="welcomeText" class="mb-0"></h3>
        <small id="userEmail" style="color:#94a3b8;"></small>
    </div>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
</div>

    <!-- Balance Card -->
    <div class="card p-4 mb-4">
        <h5>Available Balance</h5>
        <h2>$<span id="balance">0</span></h2>
    </div>

    <!-- Deposit / Withdraw -->
    <div class="row mb-4">
        <div class="col-md-6">
            <input type="number" id="depositAmount" class="form-control mb-2" placeholder="Deposit Amount">
            <button class="btn btn-custom w-100" onclick="deposit()">Deposit</button>
        </div>
        <div class="col-md-6">
            <input type="number" id="withdrawAmount" class="form-control mb-2" placeholder="Withdraw Amount">
            <button class="btn btn-danger w-100" onclick="withdraw()">Withdraw</button>
        </div>
    </div>

    <!-- Trade Section -->
    <div class="card p-4 mb-4">
        <h5>Trade</h5>
        <input type="number" id="tradeAmount" class="form-control mb-2" placeholder="Trade Amount">
        <button class="btn btn-custom w-100" onclick="trade()">Execute Trade</button>
    </div>

    <!-- Trade History -->
    <div class="card p-4 mb-4">
        <h5>Trade History</h5>
        <ul id="historyList"></ul>
    </div>

    <!-- Live Chart -->
    <div class="card p-4">
        <h5>Live Market Chart</h5>
        <div id="tradingview_chart"></div>
    </div>

</div>

<!-- TradingView -->
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
  "width": "100%",
  "height": 400,
  "symbol": "BINANCE:BTCUSDT",
  "interval": "30",
  "timezone": "Etc/UTC",
  "theme": "dark",
  "style": "1",
  "container_id": "tradingview_chart"
});
</script>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCnSo34D6diIreXIpRiTGxOIrI8gDNwNik",
    authDomain: "stocker-trade.firebaseapp.com",
    projectId: "stocker-trade",
    storageBucket: "stocker-trade.firebasestorage.app",
    messagingSenderId: "344733501351",
    appId: "1:344733501351:web:e32df233651499ccc75882"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
let userRef;

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    currentUser = user;
    userRef = doc(db, "users", user.uid);

    const snap = await getDoc(userRef);

    if (snap.exists()) {
        const data = snap.data();
        document.getElementById("welcomeText").innerText = "Welcome, " + data.fullName;
        document.getElementById("balance").innerText = data.balance || 0;

        loadHistory(data.history || []);
    }
});

function loadHistory(history){
    const list = document.getElementById("historyList");
    list.innerHTML = "";
    history.forEach(item => {
        const li = document.createElement("li");
        li.innerText = item;
        list.appendChild(li);
    });
}

window.deposit = async function(){
    const amount = parseFloat(document.getElementById("depositAmount").value);
    if(amount <= 0) return;

    const snap = await getDoc(userRef);
    let balance = snap.data().balance || 0;

    await updateDoc(userRef, {
        balance: balance + amount,
        history: arrayUnion("Deposited $" + amount)
    });

    location.reload();
}

window.withdraw = async function(){
    const amount = parseFloat(document.getElementById("withdrawAmount").value);
    if(amount <= 0) return;

    const snap = await getDoc(userRef);
    let balance = snap.data().balance || 0;

    if(amount > balance){
        alert("Insufficient balance");
        return;
    }

    await updateDoc(userRef, {
        balance: balance - amount,
        history: arrayUnion("Withdraw $" + amount)
    });

    location.reload();
}

window.trade = async function(){
    const amount = parseFloat(document.getElementById("tradeAmount").value);
    if(amount <= 0) return;

    const snap = await getDoc(userRef);
    let balance = snap.data().balance || 0;

    if(amount > balance){
        alert("Insufficient balance");
        return;
    }

    const win = Math.random() > 0.5;

    let newBalance = win ? balance + amount : balance - amount;
    let result = win ? "Trade Win +$" + amount : "Trade Loss -$" + amount;

    await updateDoc(userRef, {
        balance: newBalance,
        history: arrayUnion(result)
    });

    location.reload();
}

window.logout = async function() {
    try {
        await signOut(auth);
        window.location.replace("index.html"); 
    } catch (error) {
        console.error("Logout Error:", error);
    }
}

// onAuthStateChanged(auth, (user) => {
//     if (!user) {
//         window.location.href = "login.html";
//     }
// });

</script>


</body>
</html>

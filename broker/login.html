<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Stocker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 bg-white p-4 rounded shadow">
            <h2 class="text-center mb-4">Login</h2>
            <form id="loginForm">
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
                <p class="text-center mt-3">Don't have an account? <a href="register.html">Register</a></p>
            </form>
            <div id="status" class="mt-3 text-center"></div>
        </div>
    </div>
</div>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCnSo34D6diIreXIpRiTGxOIrI8gDNwNik",
    authDomain: "stocker-trade.firebaseapp.com",
    projectId: "stocker-trade",
    storageBucket: "stocker-trade.firebasestorage.app",
    messagingSenderId: "344733501351",
    appId: "1:344733501351:web:e32df233651499ccc75882"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const form = document.getElementById("loginForm");
  const status = document.getElementById("status");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    status.innerText = "Logging in...";

    try {
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        const user = userCredential.user;

        // Save login info to localStorage for topbar
        localStorage.setItem("loggedIn", "true");
        localStorage.setItem("userEmail", email);

        status.innerHTML = "Login successful! Redirecting...";
        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1000);

    } catch(err){
        console.error(err);
        status.innerText = err.message;
    }
  });
</script>

</body>
</html>
